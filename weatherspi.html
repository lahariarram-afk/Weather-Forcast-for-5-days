<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="card  m-5" style="width:20rem;">
        <div class="card-body">
            <h5 class="card-title text-success">Weather</h5>
            <input type="text" id="cname">
            <button type="submit" onclick="getData()">Search</button>
            <p class="card-text" id="weather"></p>
            <!-- <img id="weather-icon" src="" alt="Weather Icon"> -->
        </div>
    </div>

    <!-- <h1>Weather</h1>
    <input type="text" id="cname" />
    <button type="submit" onclick="getData()">Search</button>
    <p id="weather"></p> -->
    <script>
      async function getData() {
        let city = document.getElementById("cname").value;
        if(!city){
            alert("please enter a city name")
        }

        let res = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=171e97242c9b52994b1924b718af4b85&units=metric`
        );
        let data = await res.json();
        // console.log(city);
        let p = document.getElementById("weather");
        p.innerHTML = `
                Temperature:${data.main.temp}<br>
                Min Temperature:${data.main.temp_min}<br>
                Max Temperature:${data.main.temp_max}
            `;


      }
     </script>
  </body>
</html>
